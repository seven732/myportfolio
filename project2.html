<title>UI设计 · 纳爱斯小程序 — Jseven</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #FFFFFF; --black: #111111; --gray: #767676; --line: #E8E8E8;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body { background: var(--white); color: var(--black); font-family: var(--sans); font-weight: 300; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.75rem 3.5rem;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.nav-logo { font-family: var(--serif); font-size: 1.25rem; color: var(--black); text-decoration: none; }
.nav-back { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--black); }

/* HERO */
.project-hero { padding: 8rem 3.5rem 4rem; border-bottom: 1px solid var(--line); }
.project-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); margin-bottom: 1.5rem; }
.project-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 400; line-height: 1.05; margin-bottom: 2rem; }
.project-meta { display: flex; gap: 3rem; padding-top: 2rem; border-top: 1px solid var(--line); flex-wrap: wrap; }
.meta-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.4rem; }
.meta-value { font-size: 0.88rem; color: var(--black); }

/* THREE COLUMN UI SCREENS */
.screens-section { padding: 5rem 3.5rem; border-bottom: 1px solid var(--line); }
.screens-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2rem;
  align-items: end;
}
.screen-item { display: flex; flex-direction: column; gap: 1rem; }
.screen-item:nth-child(2) { transform: translateY(-3rem); }
.screen-item img {
  width: 100%; display: block;
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.screen-item img:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.14);
}

/* MARQUEE SCROLL */
.marquee-section { padding: 4rem 0; border-bottom: 1px solid var(--line); overflow: hidden; }
.marquee-label {
  font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray); margin-bottom: 2rem; padding-left: 3.5rem;
}
.marquee-track { display: flex; flex-direction: column; gap: 1.5rem; }
.marquee-row { display: flex; gap: 1.5rem; width: max-content; }
.marquee-row.reverse { animation: scrollLeft 30s linear infinite; }
.marquee-row.forward { animation: scrollRight 30s linear infinite; }

@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes scrollRight {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0); }
}

.mock-item {
  flex-shrink: 0;
  width: 140px;
}
.mock-item img {
  width: 100%; display: block;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* BACK */
.back-section { padding: 4rem 3.5rem; border-top: 1px solid var(--line); }
.back-link {
  font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  display: inline-flex; align-items: center; gap: 0.75rem; transition: color 0.2s;
}
.back-link:hover { color: var(--black); }
.back-line { width: 3rem; height: 1px; background: currentColor; transition: width 0.3s; }
.back-link:hover .back-line { width: 5rem; }

@media (max-width: 768px) {
  nav { padding: 1.25rem 1.5rem; }
  .project-hero { padding: 7rem 1.5rem 3rem; }
  .screens-section { padding: 3rem 1.5rem; }
  .screens-grid { gap: 1rem; }
  .screen-item:nth-child(2) { transform: translateY(-1.5rem); }
  .mock-item { width: 100px; }
  .back-section { padding: 3rem 1.5rem; }
}
</style>
