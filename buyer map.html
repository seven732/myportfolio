<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇什么怪 · 买家分布</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f14;
    color: #fff;
    font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 40px 60px 0;
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }

  .brand {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #ff85c0;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: #fff;
  }

  h1 span {
    color: #ff85c0;
    font-weight: 600;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    padding: 32px 60px;
    width: 100%;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-size: 36px;
    font-weight: 700;
    color: #ff85c0;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.1em;
  }

  .stat-divider {
    width: 1px;
    background: #222;
    align-self: stretch;
  }

  .main {
    width: 100%;
    display: flex;
    gap: 0;
    padding: 0 60px;
    flex: 1;
  }

  /* SVG China Map */
  .map-container {
    flex: 1;
    position: relative;
    min-height: 480px;
  }

  #china-map {
    width: 100%;
    height: 100%;
  }

  /* Bubble dots on map */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,133,192,0.9) 0%, rgba(255,133,192,0.2) 70%, transparent 100%);
    transform: translate(-50%, -50%);
    animation: pulse 2.5s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .bubble:hover {
    transform: translate(-50%, -50%) scale(1.3);
  }

  .bubble-label {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 10px;
    color: #fff;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(15,15,20,0.95);
    border: 1px solid rgba(255,133,192,0.4);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip-name { color: #ff85c0; font-weight: 600; margin-bottom: 2px; }
  .tooltip-count { color: #ccc; }

  /* Sidebar ranking */
  .sidebar {
    width: 200px;
    padding-left: 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .sidebar-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1e1e28;
  }

  .rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a24;
    cursor: default;
    transition: background 0.15s;
  }

  .rank-item:hover { background: rgba(255,133,192,0.04); }

  .rank-num {
    font-size: 11px;
    color: #333;
    width: 16px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .rank-item:nth-child(2) .rank-num,
  .rank-item:nth-child(3) .rank-num,
  .rank-item:nth-child(4) .rank-num { color: #ff85c0; font-weight: 700; }

  .rank-bar-wrap {
    flex: 1;
  }

  .rank-name {
    font-size: 12px;
    color: #ccc;
    margin-bottom: 4px;
  }

  .rank-bar {
    height: 2px;
    background: #1e1e28;
    border-radius: 2px;
    overflow: hidden;
  }

  .rank-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff85c0, #ffb3d9);
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .rank-count {
    font-size: 13px;
    color: #ff85c0;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 24px;
    text-align: right;
  }

  /* Footer tag */
  footer {
    width: 100%;
    padding: 24px 60px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .tag {
    background: rgba(255,133,192,0.1);
    border: 1px solid rgba(255,133,192,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: #ff85c0;
    letter-spacing: 0.08em;
  }

  .footer-note {
    font-size: 11px;
    color: #444;
    letter-spacing: 0.05em;
  }

  /* Simple SVG map of China provinces */
  .province-path {
    fill: #1a1a28;
    stroke: #2a2a3e;
    stroke-width: 0.8;
    transition: fill 0.2s;
  }

  .province-path.highlight-strong { fill: #3d1a2e; }
  .province-path.highlight-mid    { fill: #2d1a26; }
  .province-path.highlight-light  { fill: #221520; }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">奇什么怪 · Qishenmeguai</div>
    <h1>买家城市<span>分布图</span></h1>
    <div class="subtitle">基于真实订单收货地址 · 2026.05 – 2026.06</div>
  </div>
</header>

<div class="stats-row">
  <div class="stat">
    <div class="stat-num">388</div>
    <div class="stat-label">有效订单</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-num">29</div>
    <div class="stat-label">覆盖省份</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-num">60.6%</div>
    <div class="stat-label">一线 + 新一线占比</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-num">#1</div>
    <div class="stat-label">广东省 · 67单</div>
  </div>
</div>

<div class="main">
  <div class="map-container" id="mapWrap">
    <!-- Simplified China outline SVG -->
    <svg id="china-map" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff85c0" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#ff85c0" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Background -->
      <rect width="800" height="600" fill="#0f0f14"/>
      <!-- Simple China shape approximation -->
      <path class="province-path" d="M 160 80 L 320 60 L 480 70 L 580 100 L 640 140 L 680 200 L 700 280 L 680 360 L 640 420 L 580 460 L 520 480 L 460 500 L 380 490 L 300 470 L 240 440 L 180 400 L 140 350 L 120 290 L 130 220 L 150 160 Z" opacity="0.3"/>
      <!-- Grid lines subtle -->
      <line x1="0" y1="200" x2="800" y2="200" stroke="#1a1a28" stroke-width="0.5"/>
      <line x1="0" y1="350" x2="800" y2="350" stroke="#1a1a28" stroke-width="0.5"/>
      <line x1="200" y1="0" x2="200" y2="600" stroke="#1a1a28" stroke-width="0.5"/>
      <line x1="450" y1="0" x2="450" y2="600" stroke="#1a1a28" stroke-width="0.5"/>
      <line x1="650" y1="0" x2="650" y2="600" stroke="#1a1a28" stroke-width="0.5"/>
    </svg>

    <!-- Bubble dots positioned on map -->
    <div id="bubbles"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">省份排行</div>
    <div id="rankList"></div>
  </div>
</div>

<footer>
  <div class="tag">一线城市</div>
  <div class="tag">新一线城市</div>
  <div class="tag">追星女孩</div>
  <div class="tag">18–34岁</div>
  <div class="footer-note">数据来源：小红书店铺真实订单</div>
</footer>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-count" id="tt-count"></div>
</div>

<script>
const data = [
  {name:"广东",count:67,lng:113.26,lat:23.13},
  {name:"江苏",count:43,lng:118.76,lat:32.06},
  {name:"上海",count:34,lng:121.47,lat:31.23},
  {name:"浙江",count:29,lng:120.15,lat:30.28},
  {name:"北京",count:25,lng:116.40,lat:39.90},
  {name:"河南",count:23,lng:113.65,lat:34.76},
  {name:"山东",count:16,lng:117.00,lat:36.65},
  {name:"湖北",count:15,lng:114.30,lat:30.60},
  {name:"福建",count:15,lng:119.30,lat:26.08},
  {name:"四川",count:15,lng:104.07,lat:30.67},
  {name:"安徽",count:14,lng:117.28,lat:31.86},
  {name:"河北",count:13,lng:114.50,lat:38.03},
  {name:"云南",count:12,lng:102.71,lat:25.05},
  {name:"黑龙江",count:9,lng:126.53,lat:45.80},
  {name:"江西",count:8,lng:115.89,lat:28.68},
  {name:"广西",count:8,lng:108.37,lat:22.82},
  {name:"陕西",count:7,lng:108.95,lat:34.27},
  {name:"贵州",count:6,lng:106.71,lat:26.57},
  {name:"湖南",count:5,lng:112.98,lat:28.21},
  {name:"内蒙古",count:4,lng:111.67,lat:40.82},
  {name:"新疆",count:4,lng:87.62,lat:43.79},
  {name:"山西",count:3,lng:112.57,lat:37.87},
  {name:"天津",count:3,lng:117.20,lat:39.12},
  {name:"辽宁",count:2,lng:123.43,lat:41.80},
  {name:"重庆",count:2,lng:106.55,lat:29.56},
  {name:"海南",count:2,lng:110.35,lat:20.02},
  {name:"甘肃",count:2,lng:103.83,lat:36.06},
  {name:"宁夏",count:1,lng:106.27,lat:38.47},
  {name:"吉林",count:1,lng:125.32,lat:43.90}
];

// Map bounds: lng 73-135, lat 18-53 → map to SVG coords within container
function lngLatToPercent(lng, lat) {
  const lngMin = 73, lngMax = 135;
  const latMin = 15, latMax = 54;
  const x = (lng - lngMin) / (lngMax - lngMin) * 100;
  const y = (1 - (lat - latMin) / (latMax - latMin)) * 100;
  return { x, y };
}

const maxCount = data[0].count;
const wrap = document.getElementById('bubbles');
const tooltip = document.getElementById('tooltip');

data.forEach(d => {
  const pos = lngLatToPercent(d.lng, d.lat);
  const size = Math.max(18, Math.sqrt(d.count / maxCount) * 64);
  const delay = Math.random() * 2;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.cssText = `
    left: ${pos.x}%; top: ${pos.y}%;
    width: ${size}px; height: ${size}px;
    animation-delay: ${delay}s;
    z-index: 2;
  `;

  // Label for top 6
  if (d.count >= 15) {
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.style.cssText = `left: ${pos.x}%; top: calc(${pos.y}% + ${size/2 + 4}px); z-index: 3;`;
    label.textContent = d.name;
    wrap.appendChild(label);
  }

  bubble.addEventListener('mousemove', e => {
    tooltip.querySelector('#tt-name').textContent = d.name;
    tooltip.querySelector('#tt-count').textContent = `${d.count} 单 · 占比 ${(d.count/388*100).toFixed(1)}%`;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  });

  bubble.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  wrap.appendChild(bubble);
});

// Rank list
const rankList = document.getElementById('rankList');
data.slice(0, 10).forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'rank-item';
  const pct = (d.count / maxCount * 100).toFixed(0);
  item.innerHTML = `
    <div class="rank-num">${i+1}</div>
    <div class="rank-bar-wrap">
      <div class="rank-name">${d.name}</div>
      <div class="rank-bar">
        <div class="rank-bar-fill" style="width:0%" data-w="${pct}%"></div>
      </div>
    </div>
    <div class="rank-count">${d.count}</div>
  `;
  rankList.appendChild(item);
});

// Animate bars
setTimeout(() => {
  document.querySelectorAll('.rank-bar-fill').forEach(el => {
    el.style.width = el.dataset.w;
  });
}, 300);
</script>
</body>
</html>
