<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>其他设计 — Jseven</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #FFFFFF; --black: #111111; --gray: #767676; --line: #E8E8E8;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body { background: var(--white); color: var(--black); font-family: var(--sans); font-weight: 300; overflow-x: hidden; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.75rem 3.5rem;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.nav-logo { font-family: var(--serif); font-size: 1.25rem; color: var(--black); text-decoration: none; }
.nav-back { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--black); }

.project-hero { padding: 8rem 3.5rem 4rem; border-bottom: 1px solid var(--line); }
.project-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); margin-bottom: 1.5rem; }
.project-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 400; line-height: 1.05; margin-bottom: 2rem; }
.project-meta { display: flex; gap: 3rem; padding-top: 2rem; border-top: 1px solid var(--line); flex-wrap: wrap; }
.meta-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.4rem; }
.meta-value { font-size: 0.88rem; color: var(--black); }

/* GALLERY */
.gallery-section {
  padding: 5rem 3.5rem;
  min-height: 80vh;
  display: flex;
  align-items: center;
}

.gallery {
  display: flex;
  gap: 2rem;
  width: 100%;
  height: auto;
  aspect-ratio: unset;
  position: relative;
}

.gallery-item {
  flex: 1;
  overflow: hidden;
  border-radius: 4px;
  cursor: pointer;
  transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 悬停时展开 */
.gallery:hover .gallery-item { flex: 0.3; }
.gallery-item:hover { flex: 4 !important; }
.gallery-item:hover img { transform: scale(1.02); }

/* 悬停提示 */
.gallery-item::after {
  content: '查看大图';
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.gallery-item:hover::after { opacity: 1; }

/* BACK */
.back-section { padding: 4rem 3.5rem; border-top: 1px solid var(--line); }
.back-link {
  font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  display: inline-flex; align-items: center; gap: 0.75rem; transition: color 0.2s;
}
.back-link:hover { color: var(--black); }
.back-line { width: 3rem; height: 1px; background: currentColor; transition: width 0.3s; }
.back-link:hover .back-line { width: 5rem; }

@media (max-width: 768px) {
  nav { padding: 1.25rem 1.5rem; }
  .project-hero { padding: 7rem 1.5rem 3rem; }
  .gallery-section { padding: 3rem 1.5rem; min-height: auto; }
  .gallery { flex-direction: column; height: auto; gap: 1rem; }
  .gallery-item { flex: none !important; height: 50vw; }
  .gallery:hover .gallery-item { flex: none; }
  .back-section { padding: 3rem 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Jseven</a>
  <a href="index.html" class="nav-back">← 返回作品集</a>
</nav>

<div class="project-hero">
  <p class="project-label">04 · 其他设计</p>
  <h1 class="project-title">书籍装帧<br><em style="font-style:italic;color:var(--gray);">Book Design</em></h1>
  <div class="project-meta">
    <div><div class="meta-label">类型</div><div class="meta-value">书籍装帧 · 排版</div></div>
    <div><div class="meta-label">工具</div><div class="meta-value">Adobe Illustrator</div></div>
    <div><div class="meta-label">角色</div><div class="meta-value">独立完成</div></div>
  </div>
</div>

<div class="gallery-section">
  <div class="gallery">
    <div class="gallery-item">
      <img src="https://cdn.jsdelivr.net/gh/seven732/myportfolio@main/images/shu1.png" alt="书籍设计1" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="https://cdn.jsdelivr.net/gh/seven732/myportfolio@main/images/shu2.png" alt="书籍设计2" loading="lazy">
    </div>
  </div>
</div>

<div class="back-section">
  <a href="index.html" class="back-link">
    <span class="back-line"></span>返回作品集
  </a>
</div>

</body>
</html>
