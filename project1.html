<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原创品牌设计 · 奇什么怪 — Jseven</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #FFFFFF; --black: #111111; --gray: #767676; --line: #E8E8E8;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body { background: var(--white); color: var(--black); font-family: var(--sans); font-weight: 300; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.75rem 3.5rem;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.nav-logo { font-family: var(--serif); font-size: 1.25rem; color: var(--black); text-decoration: none; }
.nav-back { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--black); }

.project-hero { padding: 8rem 3.5rem 4rem; border-bottom: 1px solid var(--line); }
.project-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); margin-bottom: 1.5rem; }
.project-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 400; line-height: 1.05; margin-bottom: 2rem; }
.project-meta { display: flex; gap: 3rem; padding-top: 2rem; border-top: 1px solid var(--line); flex-wrap: wrap; }
.meta-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.4rem; }
.meta-value { font-size: 0.88rem; color: var(--black); }

.image-wrap { position: relative; width: 100%; display: block; line-height: 0; }
.project-image { width: 100%; display: block; }

.overlay { position: absolute; overflow: hidden; }

/* 框1: 收货地址 top:39.73% height:7.95% left:34.85% width:39.05% */
.overlay-map {
  top: 36%; left: 32%; width: 39.05%; height: 7.95%;
}
.overlay-map iframe { width: 100%; height: 100%; border: none; display: block; }

/* 框2: 数据成果 top:75.67% height:13.53% left:50.00% width:85.38% */
.overlay-data {
  top: 75.67%; left: 50.00%; width: 85.38%; height: 13.53%;
  background: #fff;
  display: flex; align-items: stretch;
}

.metrics-inline {
  display: grid; grid-template-columns: repeat(3, 1fr);
  width: 100%; height: 100%;
}
.mg {
  padding: 3% 4%; border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
}
.mg:last-child { border-right: none; }
.mg-label {
  font-size: clamp(5px, 0.7vw, 10px); letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--gray);
  border-bottom: 1px solid var(--line); padding-bottom: 5%; margin-bottom: 4%;
}
.mg-items { display: flex; flex-direction: column; justify-content: space-around; flex: 1; }
.mi { display: flex; align-items: baseline; gap: 3%; opacity: 0; transform: translateY(5px); transition: opacity 0.4s ease, transform 0.4s ease; }
.mi.visible { opacity: 1; transform: translateY(0); }
.mn { font-family: var(--serif); font-size: clamp(9px, 1.5vw, 20px); line-height: 1; color: var(--black); }
.mu { font-size: clamp(6px, 0.8vw, 11px); color: var(--gray); }
.md { font-size: clamp(5px, 0.6vw, 9px); color: var(--gray); }

.back-section { padding: 4rem 3.5rem; border-top: 1px solid var(--line); }
.back-link {
  font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  display: inline-flex; align-items: center; gap: 0.75rem; transition: color 0.2s;
}
.back-link:hover { color: var(--black); }
.back-line { width: 3rem; height: 1px; background: currentColor; transition: width 0.3s; }
.back-link:hover .back-line { width: 5rem; }

@media (max-width: 768px) {
  nav { padding: 1.25rem 1.5rem; }
  .project-hero { padding: 7rem 1.5rem 3rem; }
  .back-section { padding: 3rem 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Jseven</a>
  <a href="index.html" class="nav-back">← 返回作品集</a>
</nav>

<div class="project-hero">
  <p class="project-label">01 · 原创品牌设计</p>
  <h1 class="project-title">奇什么怪<br><em style="font-style:italic;color:var(--gray);">Qishenmeguai</em></h1>
  <div class="project-meta">
    <div><div class="meta-label">类型</div><div class="meta-value">品牌设计 · 新媒体运营</div></div>
    <div><div class="meta-label">时间</div><div class="meta-value">2025.04 – 至今</div></div>
    <div><div class="meta-label">平台</div><div class="meta-value">小红书</div></div>
    <div><div class="meta-label">角色</div><div class="meta-value">创始人 · 独立运营</div></div>
  </div>
</div>

<div class="image-wrap">
  <img src="images/portfolio1.png" alt="奇什么怪品牌设计" class="project-image">

  <!-- 框1: 收货地址分布地图 -->
  <div class="overlay overlay-map">
    <iframe src="buyer_map.html" scrolling="no"></iframe>
  </div>

  <!-- 框2: 数据成果 -->
  <div class="overlay overlay-data">
    <div class="metrics-inline">
      <div class="mg">
        <div class="mg-label">内容力 · Content</div>
        <div class="mg-items">
          <div class="mi"><span class="mn">5w<span class="mu">+</span></span><span class="md">话题标签热度</span></div>
          <div class="mi"><span class="mn">1200<span class="mu">+</span></span><span class="md">单篇最高互动</span></div>
          <div class="mi"><span class="mn">43<span class="mu">篇</span></span><span class="md">累计发布笔记</span></div>
        </div>
      </div>
      <div class="mg">
        <div class="mg-label">商业力 · Commerce</div>
        <div class="mg-items">
          <div class="mi"><span class="mn">2000<span class="mu">+</span></span><span class="md">累计销量</span></div>
          <div class="mi"><span class="mn">95<span class="mu">%</span></span><span class="md">商品好评率</span></div>
          <div class="mi"><span class="mn">4.8<span class="mu">/5</span></span><span class="md">服务综合评分</span></div>
        </div>
      </div>
      <div class="mg">
        <div class="mg-label">用户力 · Audience</div>
        <div class="mg-items">
          <div class="mi"><span class="mn">60.6<span class="mu">%</span></span><span class="md">一线+新一线占比</span></div>
          <div class="mi"><span class="mn">29<span class="mu">省</span></span><span class="md">收货覆盖省份</span></div>
          <div class="mi"><span class="mn">18<span class="mu">–34</span></span><span class="md">核心用户年龄段</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="back-section">
  <a href="index.html" class="back-link">
    <span class="back-line"></span>返回作品集
  </a>
</div>

<script>
const items = document.querySelectorAll('.mi');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
  });
}, { threshold: 0.1 });
items.forEach((el, i) => { el.style.transitionDelay = `${i * 0.06}s`; observer.observe(el); });
</script>
</body>
</html>
